# Builds a downloadable Windows exe (NSIS installer + portable zip).
#
# Triggers:
#   - a PR labeled `build-exe` (maintainers grant a build for manual testing)
#   - a version tag push (v*), which also creates a draft GitHub Release
#   - manual dispatch from the Actions tab
#
# The broker (mganga-broker.exe) must end up NEXT TO mganga.exe, the GUI looks
# for it in its own directory. We build it explicitly, copy it into src-tauri/,
# and add it as a bundle resource via a CI-only config overlay so the installer
# places it in the install root.

name: build-exe

on:
  pull_request:
    types: [labeled]
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed only for the release step on tag builds

jobs:
  windows:
    if: github.event_name != 'pull_request' || github.event.label.name == 'build-exe'
    runs-on: windows-latest
    # Updater artifacts are produced only when the minisign key is configured.
    # Until then, builds run exactly as before, just without latest.json.
    env:
      HAS_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build the elevated broker
        run: cargo build --release --manifest-path src-tauri/Cargo.toml --bin mganga-broker

      - name: Stage broker as a bundle resource
        shell: pwsh
        run: |
          Copy-Item target/release/mganga-broker.exe src-tauri/mganga-broker.exe
          Set-Content -Path src-tauri/ci-bundle.json -Encoding ascii -Value '{ "bundle": { "targets": ["nsis"], "resources": ["mganga-broker.exe"] } }'

      - name: Build the app (NSIS installer)
        run: npm run tauri build -- --config src-tauri/ci-bundle.json

      # ---- Code signing via SignPath Foundation (free OSS signing) ----
      # Activates only when the repo is configured with:
      #   variable SIGNPATH_ORGANIZATION_ID, secret SIGNPATH_API_TOKEN
      # Until then, builds are unsigned and everything below still works.
      # Policy: binaries are signed only from this pipeline, never locally.

      - name: Stage unsigned binaries for signing
        shell: pwsh
        run: |
          New-Item -ItemType Directory unsigned | Out-Null
          Copy-Item target/release/mganga.exe unsigned/
          Copy-Item target/release/mganga-broker.exe unsigned/
          Copy-Item (Get-ChildItem target/release/bundle/nsis/*.exe).FullName unsigned/

      - name: Upload unsigned bundle
        id: unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-binaries
          path: unsigned/*
          if-no-files-found: error

      - name: Sign via SignPath
        id: sign
        if: vars.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v1.2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: mganga
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Choose signed binaries when available
        shell: pwsh
        run: |
          $dir = if (Test-Path signed/mganga.exe) { "signed" } else { "unsigned" }
          "Using binaries from: $dir"
          New-Item -ItemType Directory final | Out-Null
          Copy-Item "$dir/*" final/

      # ---- Updater signature (minisign) over the FINAL installer ----
      # Must run AFTER SignPath so the signature covers the exact bytes users
      # download (Authenticode-signed when #4 is live, unsigned otherwise).
      # Signing at build time would cover the wrong bytes and fail verification.
      - name: Sign updater artifact
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_UPDATER_KEY == 'true'
        shell: pwsh
        run: |
          $setup = (Get-ChildItem final/*setup.exe).FullName
          npm run tauri signer sign -- `
            --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" `
            --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" `
            "$setup"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Assemble updater manifest (latest.json)
        if: startsWith(github.ref, 'refs/tags/v') && env.HAS_UPDATER_KEY == 'true'
        shell: pwsh
        run: |
          $setup = Get-ChildItem final/*setup.exe
          $sig = (Get-Content "$($setup.FullName).sig" -Raw).Trim()
          $version = "${{ github.ref_name }}".TrimStart("v")
          $url = "https://github.com/SeedeXR/mganga/releases/download/${{ github.ref_name }}/$($setup.Name)"
          $manifest = [ordered]@{
            version   = $version
            pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{ signature = $sig; url = $url }
            }
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path latest.json -Encoding utf8
          Get-Content latest.json

      - name: Assemble portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory portable | Out-Null
          Copy-Item final/mganga.exe portable/
          Copy-Item final/mganga-broker.exe portable/
          Copy-Item LICENSE portable/
          Compress-Archive -Path portable/* -DestinationPath mganga-portable-windows-x64.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: mganga-installer
          path: final/*setup.exe
          if-no-files-found: error

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: mganga-portable
          path: mganga-portable-windows-x64.zip

      - name: Publish release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Published, not draft: the updater resolves releases/latest, which
          # ignores drafts, so a draft release is invisible to auto-update.
          draft: false
          # Title is just the product name and the tag, nothing else.
          name: Mganga ${{ github.ref_name }}
          # latest.json + .sig are present only on key-configured builds; missing
          # files are skipped (fail_on_unmatched_files defaults to false).
          files: |
            final/*setup.exe
            final/*setup.exe.sig
            mganga-portable-windows-x64.zip
            latest.json
